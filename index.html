<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>학급 연락처 관리</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="group-sms.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  </head>
  <body>
    <header class="app-header">
      <div class="header-row">
        <h1>학급 연락처 관리</h1>
        <div class="header-actions">
          <button id="toggleSelectionButton" type="button" class="header-select-button" aria-pressed="false">선택</button>
          <button id="openSettingsButton" type="button" class="icon-button" aria-label="설정 열기" title="설정">
            <svg class="gear-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle cx="12" cy="12" r="3.5"></circle>
              <line x1="12" y1="2.5" x2="12" y2="6"></line>
              <line x1="12" y1="18" x2="12" y2="21.5"></line>
              <line x1="2.5" y1="12" x2="6" y2="12"></line>
              <line x1="18" y1="12" x2="21.5" y2="12"></line>
              <line x1="5" y1="5" x2="7.5" y2="7.5"></line>
              <line x1="16.5" y1="16.5" x2="19" y2="19"></line>
              <line x1="5" y1="19" x2="7.5" y2="16.5"></line>
              <line x1="16.5" y1="7.5" x2="19" y2="5"></line>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="controls" aria-label="검색 및 필터">
        <label class="search-field">
          <span class="label">검색 (이름/번호/메모)</span>
          <input
            id="searchInput"
            type="search"
            inputmode="search"
            placeholder="예: 김민준, 2반 13번, 상담"
            autocomplete="off"
          />
        </label>

        <div class="filter-grid">
          <label>
            <span class="label">반 필터</span>
            <select id="classFilter">
              <option value="all">전체 반</option>
            </select>
          </label>

          <label>
            <span class="label">태그 필터</span>
            <select id="tagFilter">
              <option value="all">전체 태그</option>
            </select>
          </label>

          <label>
            <span class="label">체크 범주</span>
            <select id="checkFilter">
              <option value="all">전체 체크</option>
              <option value="late">지각 체크됨</option>
              <option value="missing">미제출 체크됨</option>
            </select>
          </label>

          <label class="csv-upload">
            <span class="label csv-inline-title">CSV 가져오기</span>
            <input id="csvInput" type="file" accept=".csv,text/csv" />
          </label>
        </div>
      </section>

      <section>
        <h2 class="section-title">학생 목록</h2>
        <div id="cardList" class="card-list" aria-live="polite"></div>
      </section>

    </main>

    <dialog id="settingsModal" class="detail-modal">
      <article class="add-student-panel">
        <h3>설정</h3>
        <div class="bottom-management-actions" aria-label="학생 관리 버튼">
          <button id="openAddStudentButton" type="button" class="button secondary management-button">학생 추가</button>
          <button id="openDeleteStudentButton" type="button" class="button danger management-button">학생 삭제</button>
          <button id="openCheckCategoryButton" type="button" class="button secondary management-button">체크 항목 관리</button>
          <button id="exportCsvButton" type="button" class="button secondary management-button">CSV 내보내기</button>
        </div>
      </article>
      <form method="dialog" class="modal-footer">
        <button type="submit" class="button secondary close-button">닫기</button>
      </form>
    </dialog>

    <dialog id="detailModal" class="detail-modal">
      <article id="detailContent"></article>
      <form method="dialog" class="modal-footer">
        <button type="submit" class="button secondary close-button">닫기</button>
      </form>
    </dialog>

    <dialog id="addStudentModal" class="detail-modal">
      <article class="add-student-panel">
        <h3>학생 추가</h3>
        <form id="addStudentForm" class="add-student-form" novalidate>
          <div class="filter-grid">
            <label>
              <span class="label">이름 *</span>
              <input id="addName" name="name" type="text" required maxlength="30" />
            </label>
            <label>
              <span class="label">반 *</span>
              <input id="addClass" name="className" type="text" required maxlength="20" placeholder="예: 2반" />
            </label>
          </div>

          <div class="filter-grid">
            <label>
              <span class="label">번호 *</span>
              <input id="addNumber" name="number" type="text" inputmode="numeric" required maxlength="10" placeholder="예: 13" />
            </label>
            <label>
              <span class="label">학생 전화</span>
              <input id="addStudentPhone" name="studentPhone" type="tel" inputmode="tel" maxlength="20" />
            </label>
          </div>

          <label>
            <span class="label">주소</span>
            <input id="addAddress" name="address" type="text" maxlength="120" />
          </label>

          <div class="filter-grid">
            <label>
              <span class="label">보호자 1 이름</span>
              <input id="addGuardian1Name" name="guardian1Name" type="text" maxlength="30" />
            </label>
            <label>
              <span class="label">보호자 1 전화</span>
              <input id="addGuardian1Phone" name="guardian1Phone" type="tel" inputmode="tel" maxlength="20" />
            </label>
          </div>

          <div class="filter-grid">
            <label>
              <span class="label">보호자 2 이름</span>
              <input id="addGuardian2Name" name="guardian2Name" type="text" maxlength="30" />
            </label>
            <label>
              <span class="label">보호자 2 전화</span>
              <input id="addGuardian2Phone" name="guardian2Phone" type="tel" inputmode="tel" maxlength="20" />
            </label>
          </div>

          <label>
            <span class="label">태그 (쉼표로 구분)</span>
            <input id="addTags" name="tags" type="text" maxlength="120" placeholder="예: 상담필요, 방과후" />
          </label>

          <label>
            <span class="label">메모</span>
            <textarea id="addNote" name="note" class="memo-input" rows="4" placeholder="메모를 입력하세요."></textarea>
          </label>

          <p id="addStudentError" class="error form-error" aria-live="polite"></p>

          <div class="management-actions">
            <button type="button" id="cancelAddStudentButton" class="button secondary">취소</button>
            <button type="submit" class="button call-button">저장</button>
          </div>
        </form>
      </article>
    </dialog>

    <dialog id="deleteStudentModal" class="detail-modal">
      <article class="add-student-panel">
        <h3>학생 삭제</h3>
        <p class="label delete-guide">삭제할 학생을 선택하세요.</p>
        <div id="deleteStudentList" class="delete-student-list"></div>
      </article>
      <form method="dialog" class="modal-footer">
        <button id="closeDeleteStudentButton" type="submit" class="button secondary close-button">닫기</button>
      </form>
    </dialog>

    <dialog id="checkCategoryModal" class="detail-modal">
      <article class="add-student-panel">
        <h3>체크 항목 관리</h3>
        <div class="tag-create-row">
          <input id="newCheckCategoryInput" type="text" maxlength="30" placeholder="새 체크 항목 이름" />
          <button id="addCheckCategoryButton" type="button" class="button secondary small">추가</button>
        </div>
        <p id="checkCategoryError" class="error form-error" aria-live="polite"></p>
        <div id="checkCategoryList" class="delete-student-list"></div>
      </article>
      <form method="dialog" class="modal-footer">
        <button id="closeCheckCategoryButton" type="submit" class="button secondary close-button">닫기</button>
      </form>
    </dialog>

    <dialog id="groupSmsModal" class="detail-modal">
      <article class="add-student-panel">
        <h3>단체 문자 수신 대상</h3>
        <p id="groupSmsSummary" class="group-sms-summary"></p>
        <p class="group-sms-warning">단체 대화로 열리므로 수신자끼리 번호가 보일 수 있습니다.</p>
        <p id="groupSmsError" class="error form-error" aria-live="polite"></p>
        <div class="group-sms-options">
          <button type="button" class="button sms-button group-sms-option" data-phone-field="studentPhone">학생 번호</button>
          <button type="button" class="button sms-button group-sms-option" data-phone-field="guardian1Phone">보호자 1</button>
          <button type="button" class="button sms-button group-sms-option" data-phone-field="guardian2Phone">보호자 2</button>
        </div>
      </article>
      <form method="dialog" class="modal-footer">
        <button id="closeGroupSmsButton" type="submit" class="button secondary close-button">닫기</button>
      </form>
    </dialog>

    <div id="selectionBar" class="selection-bar" hidden>
      <span id="selectionCount">선택 0명</span>
      <div class="selection-actions">
        <button id="selectAllButton" type="button" class="button secondary small">전체 선택</button>
        <button id="clearSelectionButton" type="button" class="button secondary small">전체 해제</button>
        <button id="openGroupSmsButton" type="button" class="button sms-button small">단체 문자</button>
        <button id="cancelSelectionButton" type="button" class="button secondary small">취소</button>
      </div>
    </div>

    <div id="undoBar" class="undo-bar" hidden>
      <span id="undoMessage"></span>
      <button id="undoDeleteButton" type="button" class="button secondary small">삭제 취소</button>
    </div>

    <template id="cardTemplate">
      <article class="student-card" tabindex="0" role="button">
        <label class="selection-check" aria-label="학생 선택">
          <input type="checkbox" class="student-select-checkbox" />
          <span>선택</span>
        </label>
        <div class="card-head">
          <h3 class="student-name"></h3>
          <p class="student-class-number"></p>
        </div>
        <p class="primary-contact"></p>
        <div class="quick-actions">
          <a class="button call-button" target="_self" aria-label="전화 걸기">전화</a>
          <a class="button sms-button" target="_self" aria-label="문자 보내기">문자</a>
        </div>
        <div class="card-checks" aria-label="출결 및 과제 체크"></div>
      </article>
    </template>

    <script src="app.js"></script>
    <script src="group-sms.js"></script>
  </body>
</html>
